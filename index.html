<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Labor-Demonstrator</title>
    <style>
      :root {
        font-family: "Inter", "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont,
          "Helvetica Neue", sans-serif;
        color: #0f172a;
        background: #f6f7fb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      h1,
      h2,
      h3,
      h4 {
        margin: 0;
        font-weight: 600;
      }

      label {
        font-size: 0.85rem;
        color: #475569;
        margin-bottom: 0.15rem;
        display: block;
      }

      input,
      select,
      textarea,
      button {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .app-shell {
        max-width: 1300px;
        margin: 0 auto;
        padding: 2.5rem 1.5rem 4rem;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        margin-bottom: 1.5rem;
      }

      .header-title {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
      }

      .header-title h1 {
        font-size: 1.5rem;
      }

      .pathogen-picker {
        min-width: 260px;
      }

      .pathogen-picker select {
        width: 100%;
        padding: 0.6rem 0.75rem;
        border-radius: 0.5rem;
        border: 1px solid #cbd5f5;
        background: #fff;
        color: #0f172a;
        font-weight: 500;
      }

      .table-card {
        background: #fff;
        border-radius: 1rem;
        border: 1px solid #e2e8f0;
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
        padding: 1.5rem;
      }

      .table-card h2 {
        margin-bottom: 1rem;
        font-size: 1.2rem;
      }

      .table-card .actions-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
      }

      .table-card .actions-bar button {
        border: none;
        border-radius: 999px;
        padding: 0.55rem 1.1rem;
        font-weight: 600;
      }

      .primary-btn {
        background: #2563eb;
        color: #fff;
      }

      .ghost-btn {
        background: #e2e8f0;
        color: #0f172a;
      }

      .table-card table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.92rem;
      }

      .table-card thead {
        background: #f8fafc;
      }

      .table-card th,
      .table-card td {
        border-bottom: 1px solid #e2e8f0;
        padding: 0.65rem;
        text-align: left;
        vertical-align: top;
      }

      .table-card th {
        font-size: 0.8rem;
        font-weight: 600;
        color: #64748b;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .table-card tbody tr:last-child td {
        border-bottom: none;
      }

      .table-card input,
      .table-card select,
      .table-card textarea {
        width: 100%;
        padding: 0.35rem 0.45rem;
        border-radius: 0.45rem;
        border: 1px solid #cbd5f5;
        background: #fff;
        color: #0f172a;
      }

      .table-card textarea {
        min-height: 2.3rem;
        resize: vertical;
      }

      .link-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.25rem;
        border: none;
        background: transparent;
        color: #2563eb;
        padding: 0;
      }

      .muted-text {
        font-size: 0.75rem;
        color: #94a3b8;
        margin-top: 0.25rem;
      }

      .row-actions {
        display: flex;
        gap: 0.35rem;
      }

      .row-actions button {
        border: 1px solid #cbd5f5;
        border-radius: 0.4rem;
        background: #fff;
        padding: 0.2rem 0.45rem;
        font-size: 0.75rem;
      }

      .modal {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.45);
        display: none;
        align-items: flex-start;
        justify-content: center;
        padding: 2rem 1rem;
        z-index: 50;
        overflow-y: auto;
      }

      .modal.open {
        display: flex;
      }

      .modal-content {
        background: #fff;
        border-radius: 1rem;
        width: min(700px, 100%);
        padding: 1.5rem;
        box-shadow: 0 25px 80px rgba(15, 23, 42, 0.2);
        animation: fadeIn 0.2s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 1.25rem;
        gap: 1rem;
      }

      .close-btn {
        border: none;
        background: transparent;
        font-size: 1.6rem;
        line-height: 1;
        color: #94a3b8;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 1rem;
      }

      .modal-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        justify-content: flex-end;
        margin-top: 1.5rem;
      }

      .modal-actions button {
        border-radius: 0.5rem;
        border: none;
        padding: 0.6rem 1.1rem;
        font-weight: 600;
      }

      .modal-actions .secondary {
        background: #e2e8f0;
        color: #0f172a;
      }

      .modal-actions .primary {
        background: #2563eb;
        color: #fff;
      }

      .info-panel {
        margin-top: 1rem;
        padding: 0.9rem;
        border-radius: 0.75rem;
        background: #f1f5f9;
        color: #475569;
        font-size: 0.85rem;
      }

      .res-id-preview {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 0.75rem;
        padding: 0.75rem 1rem;
        margin-bottom: 1rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        flex-wrap: wrap;
      }

      .res-group {
        border: 1px solid #e2e8f0;
        border-radius: 0.75rem;
        padding: 0.9rem 1rem;
        margin-bottom: 1rem;
      }

      .res-group h4 {
        margin-bottom: 0.6rem;
        color: #0f172a;
        font-size: 0.95rem;
      }

      .res-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        margin-bottom: 0.5rem;
        flex-wrap: wrap;
      }

      .res-item:last-child {
        margin-bottom: 0;
      }

      .res-item label {
        flex: 1;
        margin: 0;
      }

      .res-item select {
        flex: 1;
        min-width: 160px;
      }

      .res-extra {
        border: 1px dashed #cbd5f5;
        border-radius: 0.75rem;
        padding: 1rem;
        background: #f8fafc;
        margin-bottom: 0.75rem;
      }

      .badge-list {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
        margin-top: 0.6rem;
      }

      .badge {
        background: #e0f2fe;
        color: #0c4a6e;
        padding: 0.2rem 0.5rem;
        border-radius: 999px;
        font-size: 0.78rem;
        display: flex;
        align-items: center;
        gap: 0.3rem;
      }

      .badge button {
        border: none;
        background: transparent;
        font-size: 0.9rem;
        color: #0f172a;
        padding: 0;
        cursor: pointer;
      }


      @media (max-width: 900px) {
        header {
          flex-direction: column;
          align-items: flex-start;
        }

        .table-card table {
          display: block;
          overflow-x: auto;
        }

        .table-card table table {
          width: 1200px;
        }
      }
    </style>
  </head>
